<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>DUMMYForm | LOGIN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <div id="navbar-root"></div>

    <div class="main-area-regist">
        <div class="floating-div">
            <form action="form.html" method="POST" id="login-form">

                <div class="registrant-title">
                    <p>Login</p>
                </div>
                <div class="registrant-input" id="login-fields-root">
                    <div>
                        <label>First time here?</label>
                        <a href="register.html" id="register-page-link">Register Now.</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <footer class="footer">:3</footer>

    <script src="js/components/components.js"></script>
    <script>
        renderNavbar({ variant: "login" });

        const loginFields = document.getElementById("login-fields-root");
        loginFields.insertAdjacentHTML("afterbegin",
            renderInput({ label: "Username: ", id: "username-login-input", placeholder: "Masukkan Username Anda" }) +
            renderInput({ label: "Password: ", id: "password-login-input", type: "password", placeholder: "Masukkan Password Anda" }) +
            renderButton({ label: "Log In", type: "submit", id: "submit-login-button", style: "margin: 20px 0 5px; width: 100%;" })
        );
    </script>
    <script src="js/loginscript.js" defer></script>
</body>

</html>
