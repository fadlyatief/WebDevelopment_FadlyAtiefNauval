<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>DUMMYForm | REGISTER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body>
    <div id="navbar-root"></div>

    <div class="main-area-regist">
        <div class="floating-div">
            <div class="registrant-title">
                <p>Register Account</p>
            </div>
            <form action="" method="POST" id="register-form">
                <div class="registrant-input" id="register-fields-root">
                    <!-- Input & button components render here -->
                    <label style="color: red; display: none; font-size: 12px; margin: 2px;" id="confirmpassword-alert">
                        This field must be the same as Password Field!
                    </label>
                    <div>
                        <label>Already have an account?</label>
                        <a href="index.html" id="register-page-link">Log in here.</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <footer class="footer">:3</footer>

    <script src="js/components/components.js"></script>
    <script>
        renderNavbar({ variant: "register" });

        const registerFields = document.getElementById("register-fields-root");
        registerFields.insertAdjacentHTML("afterbegin",
            renderInput({ label: "Username: ", id: "username-register-input", placeholder: "Masukkan Username Anda", required: true }) +
            renderInput({ label: "E-mail: ", id: "email-register-input", type: "email", placeholder: "Masukkan Email Anda", required: true }) +
            renderInput({ label: "Password: ", id: "password-register-input", type: "password", placeholder: "Masukkan Password Anda", required: true }) +
            renderInput({ label: "Confirm Password: ", id: "confirmpassword-register-input", type: "password", placeholder: "Konfirmasi Password Anda", required: true }) +
            renderButton({ label: "Register", type: "submit", id: "register-button", style: "margin: 10px 0 5px; width: 100%;" })
        );
    </script>
    <script src="js/script.js" defer></script>
</body>

</html>
